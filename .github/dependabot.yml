version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    groups:
      framework:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      minor-and-patch:
        update-types: ["minor", "patch"]
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]   # ← adiciona isso
    labels:
      - "dependencies"
      - "automated"
    # Ignora major versions de pacotes com breaking changes conhecidos
    ignore:
      - dependency-name: "tailwindcss"     # v4 é breaking
      - dependency-name: "postcss"          # mudou API

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"