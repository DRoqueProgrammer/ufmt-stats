
version: 2

updates:

  - package-ecosystem: "npm"

    directory: "/"

    schedule:

      interval: "weekly"

      day: "monday"

      time: "09:00"

      timezone: "America/Sao_Paulo"

    open-pull-requests-limit: 5

    groups:

      next-and-react:

        patterns:

          - "next"

          - "react"

          - "react-dom"

      patch-updates:

        update-types: ["minor", "patch"]

    labels:

      - "dependencies"

      - "automated"

